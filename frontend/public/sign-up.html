<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MedCraft AI</title>
    <meta name="description"
        content="Create a MedCraft AI account with Google, phone number, or email to start using the healthcare platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <main class="auth-page">
        <div class="auth-backdrop" aria-hidden="true">
            <div class="auth-backdrop__image"></div>
            <div class="auth-backdrop__overlay"></div>
            <div class="auth-float auth-float--cross"></div>
            <div class="auth-float auth-float--capsule"></div>
        </div>

        <section class="auth-shell">
            <div class="auth-brand-block">
                <a href="./index.html" class="text-link auth-back-link">Back home</a>
                <p class="eyebrow">New Patient Portal</p>
                <h1>Create Your Block-Built Health Account.</h1>
                <p class="auth-copy">
                    Join the platform in minutes and unlock AI diagnosis, report uploads, and your personal
                    care dashboard with trusted sign-up options.
                </p>
                <div class="auth-status">
                    <span>Fast onboarding</span>
                    <span>Protected medical data</span>
                </div>
            </div>

            <div class="auth-card">
                <div class="auth-card__header">
                    <p class="eyebrow">
                    <h3>Create Account</h3>
                    </p>
                </div>

                <form class="auth-form">
                    <div class="field-grid">
                        <label class="field">
                            <span>First Name</span>
                            <input type="text" placeholder="Alex">
                        </label>
                        <label class="field">
                            <span>Last Name</span>
                            <input type="text" placeholder="Walker">
                        </label>
                    </div>
                    <label class="field">
                        <span>Email</span>
                        <input type="email" placeholder="name@medcraft.ai">
                    </label>
                    <label class="field">
                        <span>Phone Number</span>
                        <input type="tel" placeholder="+91 98765 43210">
                    </label>
                    <label class="field">
                        <span>Password</span>
                        <input type="password" placeholder="Create a secure password">
                    </label>

                    <button class="button button--primary" type="submit">Create Account</button>
                </form>

                <p class="auth-footer">
                    Already have an account?
                    <a class="text-link" href="./sign-in.html">Sign in here</a>
                </p>
            </div>
        </section>
    </main>
</body>

</html>
